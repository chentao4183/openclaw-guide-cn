<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>OpenClaw 中文安装指南</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="让 AI 助手连接你的聊天应用 — 10 分钟快速上手">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <!-- Custom Styles -->
  <style>
    :root {
      --theme-color: #4A90E2;
      --theme-color-dark: #357abd;
    }
    
    .sidebar-nav > ul > li > p {
      font-weight: 600;
      font-size: 15px;
    }
    
    .markdown-section h1 {
      color: var(--theme-color);
    }
    
    .markdown-section code {
      background-color: #f8f8f8;
      padding: 2px 6px;
      border-radius: 3px;
    }
    
    .markdown-section pre {
      background-color: #282c34;
    }
    
    .markdown-section pre code {
      background-color: transparent;
    }
    
    /* 表格样式 */
    .markdown-section table {
      border-collapse: collapse;
      width: 100%;
      margin: 16px 0;
    }
    
    .markdown-section table th,
    .markdown-section table td {
      border: 1px solid #ddd;
      padding: 8px 12px;
    }
    
    .markdown-section table th {
      background-color: #f6f8fa;
      font-weight: 600;
    }
    
    /* 提示框 */
    .markdown-section .tip {
      background-color: #e6f7ff;
      border-left: 4px solid #4A90E2;
      padding: 12px 16px;
      margin: 16px 0;
      border-radius: 4px;
    }
    
    /* 徽章 */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 12px;
      color: #fff;
      background-color: #4A90E2;
    }
    
    .badge-success { background-color: #50C878; }
    .badge-warning { background-color: #f1c40f; color: #333; }
    .badge-danger { background-color: #f5222d; }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  
  <script>
    window.$docsify = {
      name: 'OpenClaw 中文安装指南',
      nameLink: '#/',
      repo: 'https://github.com/chentao4183/openclaw-guide-cn',
      loadSidebar: '_sidebar',
      loadNavbar: '_navbar',
      homepage: 'README.md',
      
      // 搜索配置
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索',
        noData: '没有结果',
        depth: 6
      },
      
      // 分页导航
      pagination: {
        previousText: '上一章节',
        nextText: '下一章节',
        crossChapter: true,
        crossChapterText: true,
      },
      
      // 代码高亮
      markdown: {
        smartypants: true
      },
      
      // 字数统计
      count: {
        countable: true,
        fontsize: '0.9em',
        color: 'rgb(90,90,90)',
        language: 'chinese'
      },
      
      // 外部链接
      externalLinkTarget: '_blank',
      
      // 路由模式
      routerMode: 'hash',
      
      // 自动跳转到顶部
      auto2top: true,
      
      // 子目录级别
      subMaxLevel: 3,
      
      // 别名
      alias: {
        '/.*/_sidebar': '_sidebar',
        '/.*/_navbar': '_navbar'
      }
    }
  </script>
  
  <!-- Docsify 核心 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  
  <!-- 搜索插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  
  <!-- 代码高亮 -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-powershell.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  
  <!-- 外部链接插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/external-script.min.js"></script>
  
  <!-- 字数统计 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-count/dist/countable.min.js"></script>
  
  <!-- Emoji 支持 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
  
  <!-- 复制代码 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  
  <!-- 分页导航 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
</body>
</html>
