theme: jekyll-theme-cayman
title: OpenClaw 中文安装指南
description: 让 AI 助手连接你的聊天应用 — 10 分钟快速上手
show_downloads: false
lang: zh-CN
url: "https://chentao4183.github.io"
baseurl: "/openclaw-guide-cn"

# 导航
navigation:
  - title: "首页"
    url: "/"
  - title: "快速开始"
    url: "/docs/quick-start"
  - title: "渠道配置"
    url: "/docs/channels/"
  - title: "进阶功能"
    url: "/docs/advanced/"
  - title: "故障排查"
    url: "/docs/troubleshooting"

# 插件
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Markdown 设置
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
